PreprocessorDefinitions=
Techniques=Deband@Deband.fx,Lightroom@qUINT_lightroom.fx,ContrastAdaptiveSharpen@CAS.fx
TechniqueSorting=Deband@Deband.fx,Lightroom@qUINT_lightroom.fx,ContrastAdaptiveSharpen@CAS.fx

; ============================================================
; Orange Begone — DLAA variant
; ============================================================
; Tuned for: NVIDIA DLSS "Native AA" (DLAA), 1080p, RTX 5070 Ti.
; Goals: maximum fidelity for this setup, and no orange skin.
;
; What's different from the base preset, and why:
;
;  - SMAA REMOVED. DLAA already anti-aliases the frame (temporally,
;    at native res) before ReShade ever sees it. Running SMAA on top
;    just re-processes an already-clean image — it costs GPU and can
;    slightly soften/mush fine edges. Dropping it is a fidelity AND
;    performance win. Chain is now: Deband -> Lightroom -> CAS.
;    (You still need the SweetFX package installed — CAS ships in it.)
;
;  - CAS raised to 0.40 (base preset is 0.30). DLAA is clean but, like
;    all temporal AA, a touch soft; modern DLSS/DLAA no longer sharpen
;    for you. At 1080p every pixel counts, and your GPU has headroom,
;    so CAS does more of the crispness work here. If edges ever look
;    crunchy or start shimmering, drop toward 0.30; for more bite, 0.50.
;
;  - Orange band pushed harder for skin (the "no orange skin" goal):
;    ORANGE saturation -0.22 (was -0.18) and ORANGE hue -0.06 (was
;    -0.05, shifts residual orange toward red). These are hue- AND
;    saturation-gated, so they target orange skin/sand/stone without
;    touching neutral surfaces. If shaded faces look pale/gray, ease
;    ORANGE saturation back toward -0.18; if skin looks pink/sunburnt,
;    ease ORANGE hue back toward -0.05.
;
;  - Global temperature -0.05 (the gentler, rebalanced value): cools
;    the overall warm daylight cast without over-chilling neutral
;    night/interior scenes. DLAA doesn't change color, so this behaves
;    exactly as in the base preset.
;
; Everything else (Deband, tone curves, vibrance, green/blue trims) is
; carried over unchanged from the base preset.

[Deband.fx]
enable_weber=1
enable_sdeviation=1
enable_depthbuffer=0
t1=0.007000
t2=0.040000
banding_depth=1.000000
range=24.000000
iterations=1
debug_output=0

[qUINT_lightroom.fx]
LIGHTROOM_ENABLE_LUT=0
LIGHTROOM_ENABLE_CURVE_DISPLAY=0
LIGHTROOM_ENABLE_CLIPPING_DISPLAY=0

; --- per-band hue (-1..1) ---
LIGHTROOM_RED_HUESHIFT=0.000000
LIGHTROOM_ORANGE_HUESHIFT=-0.060000
LIGHTROOM_YELLOW_HUESHIFT=0.060000
LIGHTROOM_GREEN_HUESHIFT=0.000000
LIGHTROOM_AQUA_HUESHIFT=0.000000
LIGHTROOM_BLUE_HUESHIFT=0.000000
LIGHTROOM_MAGENTA_HUESHIFT=0.000000

; --- per-band exposure/luminance (-1..1) ---
LIGHTROOM_RED_EXPOSURE=0.000000
LIGHTROOM_ORANGE_EXPOSURE=-0.020000
LIGHTROOM_YELLOW_EXPOSURE=-0.050000
LIGHTROOM_GREEN_EXPOSURE=0.000000
LIGHTROOM_AQUA_EXPOSURE=0.000000
LIGHTROOM_BLUE_EXPOSURE=0.000000
LIGHTROOM_MAGENTA_EXPOSURE=0.000000

; --- per-band saturation (-1..1) ---
LIGHTROOM_RED_SATURATION=-0.040000
LIGHTROOM_ORANGE_SATURATION=-0.220000
LIGHTROOM_YELLOW_SATURATION=-0.180000
LIGHTROOM_GREEN_SATURATION=0.080000
LIGHTROOM_AQUA_SATURATION=0.000000
LIGHTROOM_BLUE_SATURATION=0.050000
LIGHTROOM_MAGENTA_SATURATION=0.000000

; --- global tone / curves ---
LIGHTROOM_GLOBAL_BLACK_LEVEL=0.000000
LIGHTROOM_GLOBAL_WHITE_LEVEL=255.000000
LIGHTROOM_GLOBAL_EXPOSURE=0.000000
LIGHTROOM_GLOBAL_GAMMA=0.000000
LIGHTROOM_GLOBAL_BLACKS_CURVE=0.000000
LIGHTROOM_GLOBAL_SHADOWS_CURVE=0.030000
LIGHTROOM_GLOBAL_MIDTONES_CURVE=0.020000
LIGHTROOM_GLOBAL_HIGHLIGHTS_CURVE=-0.190000
LIGHTROOM_GLOBAL_WHITES_CURVE=-0.050000
LIGHTROOM_GLOBAL_CONTRAST=0.100000

; --- global color / white balance ---
LIGHTROOM_GLOBAL_SATURATION=0.000000
LIGHTROOM_GLOBAL_VIBRANCE=0.025000
LIGHTROOM_GLOBAL_TEMPERATURE=-0.050000
LIGHTROOM_GLOBAL_TINT=-0.005000

; ============================================================
; Sharpening — AMD FidelityFX CAS
; ============================================================
; Primary fidelity lever for this variant (SMAA is gone, DLAA handles
; AA). 0.40 recovers the slight temporal softness DLAA leaves at 1080p.
[CAS.fx]
Contrast=0.000000
Sharpening=0.400000
