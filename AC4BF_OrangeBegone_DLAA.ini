PreprocessorDefinitions=
Techniques=Deband@Deband.fx,Lightroom@qUINT_lightroom.fx,ContrastAdaptiveSharpen@CAS.fx
TechniqueSorting=Deband@Deband.fx,Lightroom@qUINT_lightroom.fx,ContrastAdaptiveSharpen@CAS.fx

; ============================================================
; Orange Begone — DLAA variant
; ============================================================
; Tuned for: NVIDIA DLSS "Native AA" (DLAA), 1080p, RTX 5070 Ti.
; Goals: maximum fidelity for this setup, and no orange skin.
;
; What's different from the base preset, and why:
;
;  - SMAA REMOVED. DLAA already anti-aliases the frame (temporally,
;    at native res) before ReShade ever sees it. Running SMAA on top
;    just re-processes an already-clean image — it costs GPU and can
;    slightly soften/mush fine edges. Dropping it is a fidelity AND
;    performance win. Chain is now: Deband -> Lightroom -> CAS.
;    (You still need the SweetFX package installed — CAS ships in it.)
;
;  - CAS raised to 0.40 (base preset is 0.30). DLAA is clean but, like
;    all temporal AA, a touch soft; modern DLSS/DLAA no longer sharpen
;    for you. At 1080p every pixel counts, and your GPU has headroom,
;    so CAS does more of the crispness work here. If edges ever look
;    crunchy or start shimmering, drop toward 0.30; for more bite, 0.50.
;
;  - CAS Contrast 0.12 (base preset leaves it at 0.00). This is the one
;    setting here that is specifically DLAA-motivated. DLAA keeps hard
;    edges crisp but leaves low-contrast texture — fabric weave, wood
;    grain, skin — slightly soft. Contrast biases CAS toward sharpening
;    exactly those low-contrast regions instead of pushing harder on
;    edges that are already clean. Prefer raising this over raising
;    Sharpening. It is a spatial filter only: it does not touch hue,
;    saturation, or white balance, so it cannot affect the orange fix.
;
;  - Deband t1 lowered to 0.005 (base preset 0.007). DLAA's temporal
;    jitter acts as mild dithering, so the banding that survives into
;    the frame is subtler than in the non-DLAA case. A lower threshold
;    means Deband smooths less aggressively and eats less fine texture —
;    which CAS then has more of to work with. If banding reappears in
;    night skies or smooth gradients, put this back to 0.007.
;
;  - Orange band pushed for skin (the "no orange skin" goal):
;    ORANGE saturation -0.20 and ORANGE hue -0.06 (base preset: -0.18 /
;    -0.05). These are hue- AND saturation-gated, so they target orange
;    skin/sand/stone without touching neutral surfaces.
;
;    On the split between these two: HUE is what actually de-oranges —
;    it rotates residual orange toward red. SATURATION just drains the
;    band, and draining it too hard is what makes skin go ashy, because
;    most of what reads as "skin" is a low-saturation orange component.
;    So when skin looks wrong, move SATURATION and leave HUE alone; you
;    keep nearly all of the anti-orange effect and get the warmth back.
;
;    -0.20 is a deliberate step back from an earlier -0.22, which was
;    draining skin: dark skin looked ashy in night interiors AND lit
;    faces looked pale/cool in direct daylight. Two independent scenes,
;    same cause, so it was ours and not the game's subsurface scattering.
;    If skin still looks pale, -0.18 is the next step. If skin looks
;    pink/sunburnt, that is the HUE lever — ease it toward -0.05.
;
;  - Global temperature -0.05 (the gentler, rebalanced value): cools
;    the overall warm daylight cast without over-chilling neutral
;    night/interior scenes. DLAA doesn't change color, so this behaves
;    exactly as in the base preset.
;
; Everything else (tone curves, vibrance, green/blue trims) is carried
; over unchanged from the base preset.
;
; ============================================================
; NVIDIA driver settings this preset assumes
; ============================================================
; Checked in the NVIDIA App, per-game settings for AC4. The short version
; is that the defaults are already correct — do not add overrides that
; only re-select what you would get anyway, they persist invisibly across
; driver updates and confuse later troubleshooting.
;
;  - DLSS Override / Super Resolution Mode: leave "Use global - Use 3D
;    app setting". Select DLAA in the GAME's graphics menu. Confirm it
;    really says DLAA, not Quality: at 1080p, Quality renders at 720p and
;    upscales, and that internal resolution is where the transformer
;    model starts dropping the fine detail (rigging, distant sails,
;    fabric) that the CAS settings above exist to bring back. This whole
;    preset is premised on a native-resolution input.
;
;  - DLSS Override / Model Presets: leave "Use global - Preset M". Preset
;    M is the current transformer Super Resolution model and the driver
;    already picks it here by default, so there is nothing to force.
;    Ray Reconstruction reports Unsupported for this title — the game's
;    ray tracing uses its own denoiser — which means the CAS tuning above
;    is reacting purely to DLAA's temporal softness. That is the
;    assumption those values were picked under.
;
;  - Frame Generation / Smooth Motion: OFF (or "Use 3D app setting").
;    Generated frames are interpolated AFTER ReShade runs, so the grade
;    and sharpening land on real frames only and the interpolated ones
;    are derived from already-graded frames. At 1080p on this class of
;    GPU there is no framerate to gain anyway, so there is no reason to
;    invite the inconsistency.
;
;  - RTX Dynamic Vibrance: OFF. This is the one driver setting that will
;    actively break the preset. It is an AI filter that pumps saturation
;    per-scene and runs AFTER the grade, so it would undo the orange
;    desaturation this preset exists to apply, unpredictably and
;    differently from scene to scene. Same applies to any Freestyle or
;    Game Filter overlay.
;
;  - Latency stack (not visual, but worth keeping): Max Frame Rate ~3 FPS
;    below refresh + Vertical Sync On + G-SYNC Compatible + Low Latency
;    On. The cap keeps frames inside the variable-refresh window so
;    V-Sync never actually engages to add latency.
;
;  - DSR: do not select a DSR resolution for this game. DSR downsampling
;    and DLAA are two different anti-aliasing approaches and should not
;    be stacked.

[Deband.fx]
enable_weber=1
enable_sdeviation=1
enable_depthbuffer=0
t1=0.005000
t2=0.040000
banding_depth=1.000000
range=24.000000
iterations=1
debug_output=0

[qUINT_lightroom.fx]
LIGHTROOM_ENABLE_LUT=0
LIGHTROOM_ENABLE_CURVE_DISPLAY=0
LIGHTROOM_ENABLE_CLIPPING_DISPLAY=0

; --- per-band hue (-1..1) ---
LIGHTROOM_RED_HUESHIFT=0.000000
LIGHTROOM_ORANGE_HUESHIFT=-0.060000
LIGHTROOM_YELLOW_HUESHIFT=0.060000
LIGHTROOM_GREEN_HUESHIFT=0.000000
LIGHTROOM_AQUA_HUESHIFT=0.000000
LIGHTROOM_BLUE_HUESHIFT=0.000000
LIGHTROOM_MAGENTA_HUESHIFT=0.000000

; --- per-band exposure/luminance (-1..1) ---
LIGHTROOM_RED_EXPOSURE=0.000000
LIGHTROOM_ORANGE_EXPOSURE=-0.020000
LIGHTROOM_YELLOW_EXPOSURE=-0.050000
LIGHTROOM_GREEN_EXPOSURE=0.000000
LIGHTROOM_AQUA_EXPOSURE=0.000000
LIGHTROOM_BLUE_EXPOSURE=0.000000
LIGHTROOM_MAGENTA_EXPOSURE=0.000000

; --- per-band saturation (-1..1) ---
LIGHTROOM_RED_SATURATION=-0.040000
LIGHTROOM_ORANGE_SATURATION=-0.200000
LIGHTROOM_YELLOW_SATURATION=-0.180000
LIGHTROOM_GREEN_SATURATION=0.080000
LIGHTROOM_AQUA_SATURATION=0.000000
LIGHTROOM_BLUE_SATURATION=0.050000
LIGHTROOM_MAGENTA_SATURATION=0.000000

; --- global tone / curves ---
LIGHTROOM_GLOBAL_BLACK_LEVEL=0.000000
LIGHTROOM_GLOBAL_WHITE_LEVEL=255.000000
LIGHTROOM_GLOBAL_EXPOSURE=0.000000
LIGHTROOM_GLOBAL_GAMMA=0.000000
LIGHTROOM_GLOBAL_BLACKS_CURVE=0.000000
LIGHTROOM_GLOBAL_SHADOWS_CURVE=0.030000
LIGHTROOM_GLOBAL_MIDTONES_CURVE=0.020000
LIGHTROOM_GLOBAL_HIGHLIGHTS_CURVE=-0.190000
LIGHTROOM_GLOBAL_WHITES_CURVE=-0.050000
LIGHTROOM_GLOBAL_CONTRAST=0.100000

; --- global color / white balance ---
LIGHTROOM_GLOBAL_SATURATION=0.000000
LIGHTROOM_GLOBAL_VIBRANCE=0.025000
LIGHTROOM_GLOBAL_TEMPERATURE=-0.050000
LIGHTROOM_GLOBAL_TINT=-0.005000

; ============================================================
; Sharpening — AMD FidelityFX CAS
; ============================================================
; Primary fidelity lever for this variant (SMAA is gone, DLAA handles
; AA). 0.40 recovers the slight temporal softness DLAA leaves at 1080p.
;
; Contrast biases sharpening toward low-contrast regions — the texture
; DLAA actually softens. If you want more bite, raise Contrast toward
; 0.15 before you raise Sharpening; it targets the softness instead of
; hammering edges that are already clean. Both are spatial-only and have
; no effect on colour, so neither can weaken the orange fix.
[CAS.fx]
Contrast=0.120000
Sharpening=0.400000
