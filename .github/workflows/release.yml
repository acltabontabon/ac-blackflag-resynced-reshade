name: Release

# Builds the Nexus-ready zip and publishes a GitHub Release whenever
# a version tag (e.g. v1.0.0) is pushed.
#
#   git tag v1.0.0
#   git push origin v1.0.0
#
# The zip is attached to the release; download it and upload to Nexus,
# or link the release page directly.

on:
  push:
    tags:
      - 'v*'
  # Allow a manual dry-run from the Actions tab (builds the zip and
  # uploads it as a workflow artifact, without creating a release).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          bash scripts/package.sh "${VERSION}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: preset-zip
          path: dist/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.zip \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
