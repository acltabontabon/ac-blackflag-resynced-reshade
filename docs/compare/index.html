<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Orange Begone — Before / After</title>
<meta name="description" content="Before/after gallery for the Orange Begone ReShade preset (AC4 Black Flag Resynced)." />
<style>
  :root{
    --bg:#0e1114; --panel:#161b20; --line:#2a333c; --text:#eef2f5; --muted:#9fb0bd;
    --accent:#5dcaa5; --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1000px; margin:0 auto; padding:32px 20px 56px}
  header{margin-bottom:22px}
  h1{font-size:26px; font-weight:600; margin:0 0 6px}
  .sub{color:var(--muted); font-size:15px; margin:0}
  .tabs{display:flex; flex-wrap:wrap; gap:8px; margin:22px 0 14px}
  .tab{
    background:var(--panel); color:var(--text); border:1px solid var(--line);
    border-radius:999px; padding:7px 15px; font-size:14px; cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  .tab:hover{border-color:#3d4a55}
  .tab[aria-selected="true"]{border-color:var(--accent); color:var(--accent)}
  .stage{
    position:relative; width:100%; aspect-ratio:16/9; background:#000;
    border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
  }
  .stage img{width:100%; height:100%; object-fit:cover; display:block}
  .cap{color:var(--muted); font-size:13px; margin:12px 2px 0}
  footer{margin-top:22px; color:var(--muted); font-size:13px}
  footer a{color:var(--accent); text-decoration:none}
  @media (prefers-color-scheme: light){
    :root{--bg:#f4f6f8; --panel:#fff; --line:#dde3e8; --text:#16202a; --muted:#5b6b78}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Orange Begone — before / after</h1>
    <p class="sub">A ReShade preset that removes the orange cast from Assassin's Creed IV: Black Flag Resynced. Each shot is split down the middle — left is vanilla, right is the preset.</p>
  </header>

  <div class="tabs" id="tabs" role="tablist" aria-label="Scenes"></div>

  <div class="stage">
    <img id="shot" alt="" />
  </div>
  <p class="cap" id="cap"></p>

  <footer>
    Built with the <a href="https://reshade.me/">ReShade</a> preset. &nbsp;·&nbsp;
    <a href="https://www.nexusmods.com/assassinscreedblackflagresynced/mods/33">Get it on Nexus</a>
  </footer>
</div>

<script>
(function(){
  var SCENES=[
    {label:'Havana rooftops', src:'../images/base/havana-rooftops.jpg', cap:'Golden rooftops and haze pulled back to natural terracotta and clean sky.'},
    {label:'Harbor',          src:'../images/base/harbor.jpg',          cap:'Open water reads properly blue instead of warm.'},
    {label:'Town square',     src:'../images/base/town-square.jpg',     cap:'Sand and stone lose the orange tint; painted walls stay vivid.'},
    {label:'Faces',           src:'../images/base/faces.jpg',           cap:'Skin looks natural — not orange, not gray.'},
    {label:'Street (DLAA)',   src:'../images/dlaa/street.jpg',          cap:'DLAA variant: same de-orange, tuned sharper for DLAA/DLSS.'},
    {label:'Encounter (DLAA)',src:'../images/dlaa/encounter.jpg',       cap:'DLAA variant: the purple dress and blue wall emerge from under the cast.'}
  ];

  var shot=document.getElementById('shot'), cap=document.getElementById('cap'), tabsEl=document.getElementById('tabs');

  function show(sc){ shot.src=sc.src; shot.alt=sc.label+' before/after'; cap.textContent=sc.cap; }

  SCENES.forEach(function(sc,i){
    var t=document.createElement('button');
    t.className='tab'; t.textContent=sc.label; t.setAttribute('role','tab');
    t.setAttribute('aria-selected', i===0?'true':'false');
    t.onclick=function(){
      [].forEach.call(tabsEl.children,function(c){c.setAttribute('aria-selected','false');});
      t.setAttribute('aria-selected','true'); show(sc);
    };
    tabsEl.appendChild(t);
  });

  show(SCENES[0]);
})();
</script>
</body>
</html>
