PreprocessorDefinitions=
Techniques=SMAA@SMAA.fx,Deband@Deband.fx,Lightroom@qUINT_lightroom.fx,ContrastAdaptiveSharpen@CAS.fx
TechniqueSorting=SMAA@SMAA.fx,Deband@Deband.fx,Lightroom@qUINT_lightroom.fx,ContrastAdaptiveSharpen@CAS.fx

; ============================================================
; Stage 0 — cleanup
; ============================================================

; Luma edge detection (mode 1), no depth buffer required. Values
; close to shader defaults — enough to smooth stair/rail edges
; without over-hunting low-contrast detail.
[SMAA.fx]
EdgeDetectionType=1
EdgeDetectionThreshold=0.100000
MaxSearchSteps=32
MaxSearchStepsDiagonal=16
CornerRounding=25
DebugOutput=0

[Deband.fx]
enable_weber=1
enable_sdeviation=1
enable_depthbuffer=0
t1=0.007000
t2=0.040000
banding_depth=1.000000
range=24.000000
iterations=1
debug_output=0

; ============================================================
; Stage 1 — grade (qUINT Lightroom, single static color pass)
; ============================================================
; Lightroom replaces the old LiftGammaGain + Tonemap + Curves +
; Vibrance stack. One shader now does white balance, exposure/tone
; shaping, and per-band (HSL) selective color, so no two passes
; fight over the same operation. It's LUT-based and must run before
; sharpening, hence its position here (after cleanup, before CAS).
;
; Anti-orange grade, dialed back from an earlier overcorrection that
; read too cool/gray/desaturated. Still clearly neutral, but with the
; Caribbean energy put back:
;  - Global temperature -0.08 (was -0.10) — cooler white balance so
;    the frame stays off the game's warm cast without going cold.
;  - Orange SATURATION -0.18 (eased so shaded faces aren't pale),
;    yellow -0.18 (a touch stronger to kill remaining gold in sand
;    and painted walls). Red trim -0.04 so Edward's coat stays rich.
;  - Orange EXPOSURE -0.01 so shaded skin regains natural brightness
;    through luminance, not saturation; yellow -0.05 keeps bright
;    beige surfaces controlled. No orange returns.
;  - Hue: yellow toward green (+0.06) and orange toward red/peach
;    (-0.05), softened from the earlier pass, so blondes read blonde
;    and skin reads peach without over-shifting.
;  - Green saturation +0.08 keeps foliage natural; blue +0.05 keeps
;    the sky clean blue. Aqua at 0 so nothing turns turquoise; clouds
;    stay neutral white.
;  - Global VIBRANCE +0.025 gently lifts low-saturation colors back
;    while the orange/yellow HSL controls keep protecting against the
;    original cast; global saturation stays at 0.
;  - Global TINT -0.005 — just enough magenta to keep shadows neutral
;    without any pink/gray influence on neutral surfaces.
;  - Tone: exposure neutral, highlight/whites compression relaxed
;    (-0.19 / -0.05) so sunlight and sand keep tropical energy and
;    texture; a small +0.02 midtone lift and +0.10 contrast restore
;    face and material depth without Clarity or FakeHDR.
[qUINT_lightroom.fx]
LIGHTROOM_ENABLE_LUT=0
LIGHTROOM_ENABLE_CURVE_DISPLAY=0
LIGHTROOM_ENABLE_CLIPPING_DISPLAY=0

; --- per-band hue (-1..1) ---
LIGHTROOM_RED_HUESHIFT=0.000000
LIGHTROOM_ORANGE_HUESHIFT=-0.050000
LIGHTROOM_YELLOW_HUESHIFT=0.060000
LIGHTROOM_GREEN_HUESHIFT=0.000000
LIGHTROOM_AQUA_HUESHIFT=0.000000
LIGHTROOM_BLUE_HUESHIFT=0.000000
LIGHTROOM_MAGENTA_HUESHIFT=0.000000

; --- per-band exposure/luminance (-1..1) ---
LIGHTROOM_RED_EXPOSURE=0.000000
LIGHTROOM_ORANGE_EXPOSURE=-0.010000
LIGHTROOM_YELLOW_EXPOSURE=-0.050000
LIGHTROOM_GREEN_EXPOSURE=0.000000
LIGHTROOM_AQUA_EXPOSURE=0.000000
LIGHTROOM_BLUE_EXPOSURE=0.000000
LIGHTROOM_MAGENTA_EXPOSURE=0.000000

; --- per-band saturation (-1..1) ---
LIGHTROOM_RED_SATURATION=-0.040000
LIGHTROOM_ORANGE_SATURATION=-0.180000
LIGHTROOM_YELLOW_SATURATION=-0.180000
LIGHTROOM_GREEN_SATURATION=0.080000
LIGHTROOM_AQUA_SATURATION=0.000000
LIGHTROOM_BLUE_SATURATION=0.050000
LIGHTROOM_MAGENTA_SATURATION=0.000000

; --- global tone / curves ---
LIGHTROOM_GLOBAL_BLACK_LEVEL=0.000000
LIGHTROOM_GLOBAL_WHITE_LEVEL=255.000000
LIGHTROOM_GLOBAL_EXPOSURE=0.000000
LIGHTROOM_GLOBAL_GAMMA=0.000000
LIGHTROOM_GLOBAL_BLACKS_CURVE=0.000000
LIGHTROOM_GLOBAL_SHADOWS_CURVE=0.030000
LIGHTROOM_GLOBAL_MIDTONES_CURVE=0.020000
LIGHTROOM_GLOBAL_HIGHLIGHTS_CURVE=-0.190000
LIGHTROOM_GLOBAL_WHITES_CURVE=-0.050000
LIGHTROOM_GLOBAL_CONTRAST=0.100000

; --- global color / white balance ---
LIGHTROOM_GLOBAL_SATURATION=0.000000
LIGHTROOM_GLOBAL_VIBRANCE=0.025000
LIGHTROOM_GLOBAL_TEMPERATURE=-0.080000
LIGHTROOM_GLOBAL_TINT=-0.005000

; ============================================================
; Stage 2 — sharpening
; ============================================================

; AMD FidelityFX CAS — sharpens low-contrast areas more than
; high-contrast ones, so it's less prone to ringing than uniform
; sharpening. Runs after the grade. Kept low so detail on faces and
; sails is crisp at 1080p without a visible "sharpened" edge.
[CAS.fx]
Contrast=0.000000
Sharpening=0.300000
