PreprocessorDefinitions=
Techniques=SMAA@SMAA.fx,Deband@Deband.fx,LiftGammaGain@LiftGammaGain.fx,Tonemap@Tonemap.fx,Curves@Curves.fx,Vibrance@Vibrance.fx,Clarity@Clarity.fx,ContrastAdaptiveSharpen@CAS.fx,Vignette@Vignette.fx
TechniqueSorting=SMAA@SMAA.fx,Deband@Deband.fx,LiftGammaGain@LiftGammaGain.fx,Tonemap@Tonemap.fx,Curves@Curves.fx,Vibrance@Vibrance.fx,Clarity@Clarity.fx,ContrastAdaptiveSharpen@CAS.fx,Vignette@Vignette.fx

; ============================================================
; Stage 0 — cleanup
; ============================================================

; Luma edge detection (mode 1), no depth buffer required. Values
; close to shader defaults — enough to smooth stair/rail edges
; without over-hunting low-contrast detail.
[SMAA.fx]
EdgeDetectionType=1
EdgeDetectionThreshold=0.100000
MaxSearchSteps=32
MaxSearchStepsDiagonal=16
CornerRounding=25
DebugOutput=0

[Deband.fx]
enable_weber=1
enable_sdeviation=1
enable_depthbuffer=0
t1=0.007000
t2=0.040000
banding_depth=1.000000
range=24.000000
iterations=1
debug_output=0

; ============================================================
; Stage 1 — base color correction (removes the yellow/sepia cast)
; ============================================================

; Red trimmed just below neutral and blue lifted only slightly —
; enough to cancel the game's sepia bias without pushing shadows
; toward cyan or losing the warm sunlight. Blue lift left at
; neutral (1.0); raising it darkens shadows toward blue faster
; than gamma/gain do.
[LiftGammaGain.fx]
RGB_Lift=1.000000,1.000000,1.003000
RGB_Gamma=0.988000,0.998000,1.018000
RGB_Gain=0.994000,1.000000,1.006000

; Defog subtracts FogColor from the frame, so it doubles up with
; LiftGammaGain's de-yellowing — disabled here to avoid stacking
; two corrections and flattening warmth. FogColor is left warm
; (not neutral/cool) so re-enabling Defog later still cancels the
; right tint instead of adding a new one. Small exposure trim and
; desaturation keep sails/sand/sky from clipping at midday.
[Tonemap.fx]
Gamma=1.000000
Exposure=-0.010000
Saturation=-0.040000
Bleach=0.000000
Defog=0.000000
FogColor=1.000000,0.800000,0.450000

; ============================================================
; Stage 2 — filmic shaping
; ============================================================

; Mode 0 = luma-only contrast, so it doesn't add saturation on top
; of Vibrance below.
[Curves.fx]
Mode=0
Formula=4
Contrast=0.090000

; RGB balance nudged only slightly off 1:1:1 — enough to keep
; ocean and jungle from reading orange without visibly cooling
; skin, sand, or sails.
[Vibrance.fx]
Vibrance=0.040000
VibranceRGBBalance=0.950000,1.000000,1.050000
Vibrance_Luma=0

; ============================================================
; Stage 3 — detail & fidelity
; ============================================================

; Local contrast, blend-masked to fade out in deep shadows and
; near-white highlights, reducing (not eliminating) halo risk at
; edges. DarkIntensity lowered so shadow-side foliage and rigging
; don't gain contrast faster than the sunlit side.
[Clarity.fx]
ClarityRadius=3
ClarityOffset=2.000000
ClarityBlendMode=2
ClarityBlendIfDark=50
ClarityBlendIfLight=205
ClarityViewBlendIfMask=0
ClarityStrength=0.120000
ClarityDarkIntensity=0.300000
ClarityLightIntensity=0.000000
ClarityViewMask=0

; AMD FidelityFX CAS — sharpens low-contrast areas more than
; high-contrast ones, so it's less prone to ringing than uniform
; sharpening. Kept under half strength for clean detail on faces
; and sails at 1080p without a visible "sharpened" edge.
[CAS.fx]
Contrast=0.000000
Sharpening=0.400000

; ============================================================
; Stage 4 — cinematic finish
; ============================================================

; Light corner darkening — present enough to draw focus, faint
; enough that it doesn't read as an added effect.
[Vignette.fx]
Type=0
Ratio=1.250000
Radius=1.700000
Amount=-0.100000
Slope=4
Center=0.500000,0.500000

; ============================================================
; Optional — FilmGrain (off by default)
; ============================================================
; Grain reads well in screenshots but adds visible texture noise
; during normal play. To use it for a screenshot: uncomment the
; block below, add "FilmGrain@FilmGrain.fx" to both Techniques
; and TechniqueSorting above (after Vignette@Vignette.fx), then
; reload the preset in the ReShade overlay.
;
;[FilmGrain.fx]
;Intensity=0.150000
;Variance=0.350000
;Mean=0.500000
;SignalToNoiseRatio=8
