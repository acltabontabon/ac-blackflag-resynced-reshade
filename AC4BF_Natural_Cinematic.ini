PreprocessorDefinitions=MXAO_HIGH_QUALITY=1
Techniques=SMAA@SMAA.fx,Deband@Deband.fx,MXAO@qUINT_mxao.fx,LiftGammaGain@LiftGammaGain.fx,Tonemap@Tonemap.fx,Curves@Curves.fx,HDR@FakeHDR.fx,Vibrance@Vibrance.fx,Clarity@Clarity.fx,ContrastAdaptiveSharpen@CAS.fx,Vignette@Vignette.fx,FilmGrain@FilmGrain.fx
TechniqueSorting=SMAA@SMAA.fx,Deband@Deband.fx,MXAO@qUINT_mxao.fx,LiftGammaGain@LiftGammaGain.fx,Tonemap@Tonemap.fx,Curves@Curves.fx,HDR@FakeHDR.fx,Vibrance@Vibrance.fx,Clarity@Clarity.fx,ContrastAdaptiveSharpen@CAS.fx,Vignette@Vignette.fx,FilmGrain@FilmGrain.fx

; ============================================================
; Stage 0 — cleanup (runs first so nothing amplifies banding
; or sharpens jaggies)
; ============================================================

; Luma edge detection (mode 1) needs no depth buffer. Threshold
; lowered from the 0.10 default to catch railings/rigging edges;
; search steps raised for longer, smoother gradients on near-
; horizontal stair/rope lines.
[SMAA.fx]
EdgeDetectionType=1
EdgeDetectionThreshold=0.080000
MaxSearchSteps=48
MaxSearchStepsDiagonal=16
CornerRounding=25
DebugOutput=0

[Deband.fx]
enable_weber=1
enable_sdeviation=1
enable_depthbuffer=0
t1=0.007000
t2=0.040000
banding_depth=1.000000
range=24.000000
iterations=1
debug_output=0

; ============================================================
; Stage 0.5 — lighting (depth-based; runs before the grade so
; color correction tames it)
; ============================================================

; GTAO mode (MXAO_HIGH_QUALITY=1 in PreprocessorDefinitions) —
; physically-based occlusion, no halos. Quality preset 4 = 32
; samples; cheap at this res on a 5070 Ti. Amount kept below 1.0
; because the game already bakes some AO — this adds contact
; shadows where geometry meets, not a global darkening.
; Fade end 0.4 keeps AO off distant haze and sky.
[qUINT_mxao.fx]
MXAO_GLOBAL_SAMPLE_QUALITY_PRESET=4
MXAO_SAMPLE_RADIUS=2.500000
MXAO_SAMPLE_NORMAL_BIAS=0.200000
MXAO_GLOBAL_RENDER_SCALE=1.000000
MXAO_SSAO_AMOUNT=0.700000
MXAO_BLEND_TYPE=0
MXAO_FADE_DEPTH_START=0.050000
MXAO_FADE_DEPTH_END=0.400000
MXAO_DEBUG_VIEW_ENABLE=0

; ============================================================
; Stage 1 — base color correction (kills the yellow/sepia cast)
; ============================================================

; Gamma > 1 brightens that channel's midtones. Blue up + red down
; = direct counter to the warm grade without touching exposure.
[LiftGammaGain.fx]
RGB_Lift=1.000000,1.000000,1.010000
RGB_Gamma=0.980000,0.995000,1.035000
RGB_Gain=0.990000,1.000000,1.010000

; Defog SUBTRACTS FogColor from the frame (scaled ~2.55x), so the
; fog color must match the tint being removed — warm, not cool.
; Keep Defog tiny; it lifts blacks toward the complement fast.
[Tonemap.fx]
Gamma=1.000000
Exposure=0.000000
Saturation=-0.050000
Bleach=0.020000
Defog=0.020000
FogColor=1.000000,0.800000,0.450000

; ============================================================
; Stage 2 — filmic shaping
; ============================================================

; Mode 0 = luma only, so contrast doesn't re-boost saturation.
[Curves.fx]
Mode=0
Formula=4
Contrast=0.120000

; Static local dynamic-range expansion — deeper shadows, brighter
; highlights, no exposure/adaptation logic so it can never pump or
; flicker. Power kept below the 1.30 default; Curves already
; carries global contrast, this adds the "HDR pop" on top.
[FakeHDR.fx]
HDRPower=1.150000
radius1=0.793000
radius2=0.870000

; RGB balance weights vibrance away from red/orange (already hot
; in this game) and toward blue — richer ocean/sky, no re-yellowing.
[Vibrance.fx]
Vibrance=0.100000
VibranceRGBBalance=0.700000,1.000000,1.250000
Vibrance_Luma=0

; ============================================================
; Stage 3 — detail & fidelity
; ============================================================

; Local contrast, masked to skip deep shadows and near-whites so it
; never halos. Kept moderate — Curves already carries global contrast.
[Clarity.fx]
ClarityRadius=3
ClarityOffset=2.000000
ClarityBlendMode=2
ClarityBlendIfDark=50
ClarityBlendIfLight=205
ClarityViewBlendIfMask=0
ClarityStrength=0.250000
ClarityDarkIntensity=0.400000
ClarityLightIntensity=0.000000
ClarityViewMask=0

; AMD FidelityFX CAS — adaptive: sharpens soft areas strongly,
; backs off where contrast is already high, so no ringing/halos
; on the edges SMAA just smoothed. Replaces LumaSharpen.
[CAS.fx]
Contrast=0.000000
Sharpening=1.000000

; ============================================================
; Stage 4 — cinematic finish (subtle on purpose)
; ============================================================

[Vignette.fx]
Type=0
Ratio=1.250000
Radius=1.700000
Amount=-0.350000
Slope=4
Center=0.500000,0.500000

; SNR 8 keeps grain out of bright sky/sand; reads as film, not noise.
[FilmGrain.fx]
Intensity=0.150000
Variance=0.350000
Mean=0.500000
SignalToNoiseRatio=8
