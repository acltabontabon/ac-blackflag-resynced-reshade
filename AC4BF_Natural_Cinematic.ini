PreprocessorDefinitions=
Techniques=SMAA@SMAA.fx,Deband@Deband.fx,Lightroom@qUINT_lightroom.fx,ContrastAdaptiveSharpen@CAS.fx
TechniqueSorting=SMAA@SMAA.fx,Deband@Deband.fx,Lightroom@qUINT_lightroom.fx,ContrastAdaptiveSharpen@CAS.fx

; ============================================================
; Stage 0 — cleanup
; ============================================================

; Luma edge detection (mode 1), no depth buffer required. Values
; close to shader defaults — enough to smooth stair/rail edges
; without over-hunting low-contrast detail.
[SMAA.fx]
EdgeDetectionType=1
EdgeDetectionThreshold=0.100000
MaxSearchSteps=32
MaxSearchStepsDiagonal=16
CornerRounding=25
DebugOutput=0

[Deband.fx]
enable_weber=1
enable_sdeviation=1
enable_depthbuffer=0
t1=0.007000
t2=0.040000
banding_depth=1.000000
range=24.000000
iterations=1
debug_output=0

; ============================================================
; Stage 1 — grade (qUINT Lightroom, single static color pass)
; ============================================================
; Lightroom replaces the old LiftGammaGain + Tonemap + Curves +
; Vibrance stack. One shader now does white balance, exposure/tone
; shaping, and per-band (HSL) selective color, so no two passes
; fight over the same operation. It's LUT-based and must run before
; sharpening, hence its position here (after cleanup, before CAS).
;
; Anti-orange strategy:
;  - Global temperature negative = cooler white balance (lerps the
;    frame toward blue ~202deg). This is the main, decisive shift
;    off the game's warm cast — not a microscopic nudge.
;  - Orange/yellow SATURATION pulled down hardest (orange -0.30,
;    yellow -0.20) so skin, sand, stone, hair and cream fabric stop
;    reading gold; red only lightly trimmed (-0.08) so Edward's
;    coat stays rich.
;  - Orange/yellow EXPOSURE lowered (orange -0.15, yellow -0.10) so
;    warm highlights on skin/cloth/ground keep visible texture
;    instead of glowing.
;  - Hue: yellow nudged toward green (+0.10) and orange toward red/
;    peach (-0.08) so blondes read blonde and skin reads peach.
;  - Green given a touch of saturation back (+0.08) so foliage stays
;    natural green after the global cooling, not olive.
;  - Blue/aqua left neutral so the sky doesn't turn turquoise.
[qUINT_lightroom.fx]
LIGHTROOM_ENABLE_LUT=0
LIGHTROOM_ENABLE_CURVE_DISPLAY=0
LIGHTROOM_ENABLE_CLIPPING_DISPLAY=0

; --- per-band hue (-1..1) ---
LIGHTROOM_RED_HUESHIFT=0.000000
LIGHTROOM_ORANGE_HUESHIFT=-0.080000
LIGHTROOM_YELLOW_HUESHIFT=0.100000
LIGHTROOM_GREEN_HUESHIFT=0.000000
LIGHTROOM_AQUA_HUESHIFT=0.000000
LIGHTROOM_BLUE_HUESHIFT=0.000000
LIGHTROOM_MAGENTA_HUESHIFT=0.000000

; --- per-band exposure/luminance (-1..1) ---
LIGHTROOM_RED_EXPOSURE=0.000000
LIGHTROOM_ORANGE_EXPOSURE=-0.150000
LIGHTROOM_YELLOW_EXPOSURE=-0.100000
LIGHTROOM_GREEN_EXPOSURE=0.000000
LIGHTROOM_AQUA_EXPOSURE=0.000000
LIGHTROOM_BLUE_EXPOSURE=0.000000
LIGHTROOM_MAGENTA_EXPOSURE=0.000000

; --- per-band saturation (-1..1) ---
LIGHTROOM_RED_SATURATION=-0.080000
LIGHTROOM_ORANGE_SATURATION=-0.300000
LIGHTROOM_YELLOW_SATURATION=-0.200000
LIGHTROOM_GREEN_SATURATION=0.080000
LIGHTROOM_AQUA_SATURATION=0.000000
LIGHTROOM_BLUE_SATURATION=0.000000
LIGHTROOM_MAGENTA_SATURATION=0.000000

; --- global tone / curves ---
LIGHTROOM_GLOBAL_BLACK_LEVEL=0.000000
LIGHTROOM_GLOBAL_WHITE_LEVEL=255.000000
LIGHTROOM_GLOBAL_EXPOSURE=-0.050000
LIGHTROOM_GLOBAL_GAMMA=0.000000
LIGHTROOM_GLOBAL_BLACKS_CURVE=0.000000
LIGHTROOM_GLOBAL_SHADOWS_CURVE=0.050000
LIGHTROOM_GLOBAL_MIDTONES_CURVE=0.000000
LIGHTROOM_GLOBAL_HIGHLIGHTS_CURVE=-0.300000
LIGHTROOM_GLOBAL_WHITES_CURVE=-0.150000
LIGHTROOM_GLOBAL_CONTRAST=0.040000

; --- global color / white balance ---
LIGHTROOM_GLOBAL_SATURATION=0.000000
LIGHTROOM_GLOBAL_VIBRANCE=0.000000
LIGHTROOM_GLOBAL_TEMPERATURE=-0.100000
LIGHTROOM_GLOBAL_TINT=0.000000

; ============================================================
; Stage 2 — sharpening
; ============================================================

; AMD FidelityFX CAS — sharpens low-contrast areas more than
; high-contrast ones, so it's less prone to ringing than uniform
; sharpening. Runs after the grade. Kept low so detail on faces and
; sails is crisp at 1080p without a visible "sharpened" edge.
[CAS.fx]
Contrast=0.000000
Sharpening=0.300000
